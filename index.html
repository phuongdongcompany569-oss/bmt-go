<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BMT GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

.hero{
position:relative;
min-height:100vh;
background:url('tuongdai.jpg') center center/cover no-repeat;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.62);
backdrop-filter:blur(1px);
}

.wrapper{
position:relative;
z-index:2;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:90px;
}

.brand-text h2{
font-size:36px;
font-weight:800;
line-height:1;
}

.brand-text h2 span{
color:#ff2d2d;
}

.brand-text p{
font-size:11px;
color:#ccc;
margin-top:5px;
}

.menu{
width:52px;
height:52px;
border-radius:50%;
background:rgba(0,0,0,.5);
backdrop-filter:blur(12px);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
cursor:pointer;
}

.content{
margin-top:80px;
}

.content h3{
font-size:20px;
font-weight:300;
margin-bottom:5px;
}

.content h1{
font-size:72px;
font-weight:800;
line-height:.95;
margin-bottom:15px;
}

.subtitle{
font-size:20px;
color:#ddd;
max-width:280px;
line-height:1.5;
}

.line{
width:60px;
height:6px;
border-radius:30px;
background:#ff2d2d;
margin:35px 0;
}

.question{
font-size:22px;
font-weight:700;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:rgba(10,10,10,.55);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
border-color:#ff2d2d;
}

.icon{
font-size:30px;
margin-bottom:10px;
display:block;
}

.card-title{
font-size:18px;
font-weight:600;
}

.full{
grid-column:1/3;
}

.dropdown{
display:none;
margin-top:12px;
background:rgba(0,0,0,.65);
border-radius:15px;
overflow:hidden;
}

.dropdown a{
display:block;
padding:14px;
text-decoration:none;
color:#fff;
border-bottom:1px solid rgba(255,255,255,.08);
}

.dropdown a:last-child{
border:none;
}

.dropdown a:hover{
background:rgba(255,45,45,.15);
}

.show{
display:block;
}

.taxi{
position:fixed;
right:22px;
bottom:25px;
width:95px;
height:95px;
border:none;
border-radius:50%;
background:#ff2d2d;
color:#fff;
font-size:15px;
font-weight:700;
box-shadow:0 0 30px rgba(255,45,45,.5);
z-index:999;
cursor:pointer;
}

.taxi span{
display:block;
font-size:32px;
margin-bottom:3px;
}

</style>

</head>

<body>

<section class="hero">

<div class="wrapper">

<div class="header">

<div class="brand">

<img src="phuong-dong.png" class="logo">

<div class="brand-text">
<h2>BMT <span>GO</span></h2>
<p>Khám phá Buôn Ma Thuột như người địa phương</p>
</div>

</div>

<div class="menu">☰</div>

</div>

<div class="content">

<h3>Chào mừng đến</h3>

<h1>Buôn Ma<br>Thuột</h1>

<div class="subtitle">
Khám phá Buôn Ma Thuột như người địa phương
</div>

<div class="line"></div>

<div class="question">
Hôm nay bạn muốn làm gì?
</div>

<div class="grid">

<div>

<div class="card" onclick="toggleMenu('food')">
<span class="icon">🍜</span>
<div class="card-title">Ăn đặc sản</div>
</div>

<div id="food" class="dropdown">
<a href="#">Bún đỏ Buôn Ma Thuột</a>
<a href="#">Bánh ướt thịt nướng</a>
<a href="#">Cơm lam gà nướng</a>
<a href="#">Bún chìa</a>
<a href="#">Lẩu cá lăng</a>
</div>

</div>
